services:
  domain-list-manager:
    image: ghcr.io/edikskrim/domain-list-manager:latest
    container_name: domain-list-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_PATH=/app/data/domains.db
    volumes:
      - data:/app/data
      - output:/app/output
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - dlm-net

volumes:
  data:
  output:

networks:
  dlm-net:
    driver: bridge
